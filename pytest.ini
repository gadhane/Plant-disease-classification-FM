[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    --tb=short
    --strict-markers
    -q

# Custom markers
markers =
    slow: marks tests as slow (skip with -m "not slow")
    gpu: marks tests that require a GPU (skip with -m "not gpu")
