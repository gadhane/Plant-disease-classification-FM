# =============================================================================
# .github/workflows/ci.yml
# Continuous Integration — Lint + Unit Tests
#
# Triggers:
#   - Push to main or develop
#   - Any pull request targeting main or develop
# =============================================================================

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (flake8 + isort)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 isort

      - name: Run flake8
        run: flake8 .

      - name: Check import ordering (isort)
        run: |
          isort --check-only --diff \
            --skip venv --skip .venv \
            .

  # ---------------------------------------------------------------------------
  # Job 2: Unit Tests (CPU only — no GPU in GitHub Actions free tier)
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.9", "3.10", "3.11" ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install CPU-only torch to keep CI fast (no CUDA needed for unit tests)
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false