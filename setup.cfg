[flake8]
max-line-length = 120
exclude =
    venv,
    .venv,
    __pycache__,
    .git,
    build,
    dist
ignore =
    E402,
    E203,
    W503,
    E211,
    E226,
    E272,
    E501,
    W291,
    W293,
    E302,
    E303,
    F841,
    E305,
    W391,
    E741,
    F401,
    E266,
    W504,
    E241,
    E221,
    F541,
    E251,
    E261,
    E262,
    W605
per-file-ignores =
    tests/*:E501,F401,E302

[isort]
profile = black
line_length = 120
skip = venv,.venv
known_third_party = torch,torchvision,numpy,matplotlib,sklearn,cv2,PIL