[flake8]
max-line-length = 120
exclude =
    venv,
    .venv,
    __pycache__,
    .git,
    build,
    dist
ignore =
    E203,   # whitespace before ':'  (conflicts with Black)
    W503,   # line break before binary operator (conflicts with PEP8 update)
    E501    # line too long — handled by max-line-length above
per-file-ignores =
    tests/*:E501

[isort]
profile = black
line_length = 120
skip = venv,.venv
known_third_party = torch,torchvision,numpy,matplotlib,sklearn,cv2,PIL
